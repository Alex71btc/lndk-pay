services:
  bolt12-pay:
    build: .
    container_name: bolt12-pay
    restart: unless-stopped
    ports:
      - "8091:8081"
    environment:
      LNDK_CLI: /usr/local/bin/lndk-cli
      LNDK_NETWORK: bitcoin
      LNDK_GRPC_HOST: https://YOUR_NODE_IP
      LNDK_GRPC_PORT: "7000"
      LNDK_CERT_PATH: /secrets/tls.cert
      LNDK_MACAROON_PATH: /secrets/admin.macaroon
      LNDK_TIMEOUT_SECONDS: "30"
      ALLOW_PAY_OFFER: "true"
      LND_REST_URL: ${LND_REST_URL:-https://YOUR_NODE_IP:8080}
      LND_TLS_CERT_PATH: ${LND_TLS_CERT_PATH:-/secrets/tls.cert}
      LND_MACAROON_PATH: ${LND_MACAROON_PATH:-/secrets/admin.macaroon}
      LND_REST_INSECURE: ${LND_REST_INSECURE:-true}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      CF_ZONE_ID: ${CF_ZONE_ID:-}
      CF_ZONE_NAME: ${CF_ZONE_NAME:-}
      PUBLIC_LNURL_ADDRESS: ${PUBLIC_LNURL_ADDRESS:-lnurl@yourdomain.com}
      LNURL_BASE_DOMAIN: ${LNURL_BASE_DOMAIN:-yourdomain.com}
      LNURL_BASE_URL: ${LNURL_BASE_URL:-https://yourdomain.com}
      LNURL_MIN_SENDABLE_MSAT: ${LNURL_MIN_SENDABLE_MSAT:-1000}
      LNURL_MAX_SENDABLE_MSAT: ${LNURL_MAX_SENDABLE_MSAT:-1000000000}
      LNURL_COMMENT_ALLOWED: ${LNURL_COMMENT_ALLOWED:-120}
      LNURL_ALIAS_MODE: ${LNURL_ALIAS_MODE:-shared}
      LNURL_SHARED_DESCRIPTION: ${LNURL_SHARED_DESCRIPTION:-LNURL payment via yourdomain.com}
      LNURL_DEFAULT_DESCRIPTION: ${LNURL_DEFAULT_DESCRIPTION:-Lightning payment}
      LNURL_ALIAS_MAP: ${LNURL_ALIAS_MAP:-}
      CORS_ORIGINS: "*"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./data:/data
      - ./secrets:/secrets:ro
