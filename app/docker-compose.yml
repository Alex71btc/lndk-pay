version: "3.8"

services:
  bolt12-pay:
    build: .
    container_name: bolt12-pay
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      LNDK_NETWORK: bitcoin
      LNDK_GRPC_HOST: https://YOUR_NODE_IP
      LNDK_GRPC_PORT: "7000"
      LNDK_CERT_PATH: /secrets/tls.cert
      LNDK_MACAROON_PATH: /secrets/admin.macaroon
      LNDK_TIMEOUT_SECONDS: "30"
      ALLOW_PAY_OFFER: "true"
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      CF_ZONE_ID: ${CF_ZONE_ID:-}
      CF_ZONE_NAME: ${CF_ZONE_NAME:-}
      CORS_ORIGINS: "*"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./secrets:/secrets:ro
