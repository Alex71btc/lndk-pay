releaseNotes: |
  Major UI update with full bilingual support (EN/DE) and improved UX.

  • Full English + German interface with live language switching
  • All UI texts, toasts, and status messages translated
  • Offer History now uses language-aware timestamps (auto-switch)
  • Fixed QR code initialization and refresh issues
  • Improved payment summaries for BOLT12, BOLT11 and LNURL
  • Cleaner Nostr Identity and Cloudflare BIP353 UI
  • Removed hardcoded strings and unified translation system
dependencies:
  - lightning
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
