releaseNotes: |
  Improves first-run reliability and deployment safety.

  • Fixes fresh-install startup by bundling safe default config files in the image
  • Prevents missing-config crashes on new deployments with empty app data
  • Separates runtime config from image build context for safer secret handling
  • Improves mobile clipboard fallback and NWC usability
