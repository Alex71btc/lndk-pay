manifestVersion: 1
id: alex-bolt12-pay
name: BOLT12 Pay
icon: https://raw.githubusercontent.com/Alex71btc/umbrel-community-store/master/alex-bolt12-pay/icon_v2.png
tagline: First self-hosted BIP353 Lightning Address & BOLT12 Offer app for LND nodes
category: finance
version: 0.2.71
port: 8091
description: >-
  Self-hosted Lightning payment and identity server with native BOLT12 support.


  Create and receive payments using next-generation BOLT12 offers, Lightning Address (BIP353), and LNURL — all from your own node.


  Includes Nostr identity (NIP-05), Zap support, and real-time notifications, with seamless fallback between BOLT12, LNURL, and BOLT11 for maximum compatibility.


  Designed for sovereign Bitcoin users who want full control over their Lightning infrastructure, identities, and payments.


  FEATURES
    - BOLT12 Offers – Create and pay offers via LNDK
    - Lightning Address – BIP353 + LNURL server
    - BOLT11 Fallback – Maximum wallet compatibility
    - Nostr Identity – NIP-05 support
    - Zaps & Notifications – LN addresses with Zap support + DM notifications
    - Nostr Wallet Connect (NWC) - Zap wallet for Nostr Clients like Amethyst
    - Multi-Relay Support – Works across multiple relays
    - Cloudflare DNS – Optional automatic publishing
    - Self-Hosted – Full control on Umbrel
    - Mobile-Friendly UI – Clean and optimized UX

  NOTE
    - BOLT12 support on LND is still evolving and considered experimental.
