manifestVersion: 1
id: alex-bolt12-pay
name: BOLT12 Pay
icon: https://raw.githubusercontent.com/Alex71btc/umbrel-community-store/master/alex-bolt12-pay/icon_v2.png
tagline: First self-hosted BIP353 Lightning Address & BOLT12 Offer app for LND nodes
category: finance
version: 0.2.78
port: 8091
description: >
  Self-hosted Lightning payments + identity for your own node.

  Create and receive payments using:
  - BOLT12 Offers (next-gen Lightning)
  - Lightning Address (BIP353)
  - LNURL (fallback)
  - BOLT11 invoices

  No custodians. No external services. Full control.

  ---

  WHAT YOU CAN DO

  - Create reusable BOLT12 payment requests
  - Run your own Lightning Address server
  - Receive payments via LNURL and BOLT11
  - Use your own domain for payments
  - Add Nostr identity (NIP-05) and receive Zaps
  - Optional Cloudflare DNS automation

  ---

  WHY THIS APP

  Most Lightning Address services are custodial.

  BOLT12 Pay gives you:
  - full ownership of your node
  - full control over your domain
  - a future-proof Lightning setup

  ---

  IMPORTANT (Umbrel)

  BOLT12 requires onion messaging in LND.

  Connect via SSH:

      ssh umbrel@umbrel.local

  Open the config:

      nano ~/umbrel/app-data/lightning/data/lnd/lnd.conf

  Add at the end:

      [protocol]
      custom-message=513
      custom-nodeann=39
      custom-init=39

  Restart Lightning afterwards.

  Without this, BOLT12 will not work.

  ---

  EXPERIMENTAL NOTICE

  - BOLT12 on LND is still evolving
  - Wallet support may vary
  - This app uses cutting-edge Lightning features

  ---

  Made for sovereign Bitcoin users.
